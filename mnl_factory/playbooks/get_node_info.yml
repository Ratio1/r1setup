---
- name: Get Node Information
  hosts: gpu_nodes
  become: false
  gather_facts: true
  tasks:
    - name: Run get_node_info command (host wrapper first, docker exec fallback)
      # Try the host wrapper (/usr/local/bin/get_node_info in standard mode,
      # r1service in expert mode). If that is missing (setup role was
      # incomplete or this host was manually provisioned), fall back to
      # reading the same file the wrapper would have cat'd, directly via
      # docker exec. The file path is extracted from the bundled copy of
      # the edge_node script at ../remote_cmds/get_node_info so we have a
      # single source of truth for the path and don't hardcode it in the
      # playbook.
      vars:
        _node_info_cmd: "{{ r1setup_remote_get_node_info_command }}"
        _bundled_script: "{{ lookup('file', playbook_dir + '/../remote_cmds/get_node_info') }}"
        _container_file: "{{ _bundled_script | regex_search('FILE=([^\\s\\n]+)', '\\\\1') | first }}"
      ansible.builtin.shell: |
        set -o pipefail
        CMD={{ _node_info_cmd | quote }}
        FIRST_WORD="${CMD%% *}"
        if command -v "$FIRST_WORD" >/dev/null 2>&1; then
          eval "$CMD"
        elif command -v docker >/dev/null 2>&1 && docker inspect {{ mnl_docker_container_name | quote }} >/dev/null 2>&1; then
          docker exec -i {{ mnl_docker_container_name | quote }} bash -lc {{ ("cat " ~ _container_file) | quote }}
        else
          echo "neither '${FIRST_WORD}' wrapper nor container '{{ mnl_docker_container_name }}' is reachable on this host" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      register: node_info
      ignore_errors: true

    - name: Display node information
      debug:
        var: node_info.stdout_lines
      when: node_info.stdout_lines is defined

    - name: Display error if command failed
      debug:
        var: node_info.stderr_lines
      when: node_info.stderr_lines is defined and node_info.stderr_lines | length > 0

