---
- name: Check Edge Node Service Status
  hosts: gpu_nodes
  become: true
  gather_facts: true
  ignore_unreachable: true
  any_errors_fatal: false
  vars:
    ansible_roles_path: "{{ playbook_dir }}/../roles"
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
    - ../group_vars/mnl.yml
    - ../group_vars/variables.yml
  pre_tasks:
    - name: Resolve per-instance runtime vars
      ansible.builtin.import_tasks: tasks/resolve_instance_runtime_vars.yml
    - name: Probe configured service presence
      ansible.builtin.import_tasks: tasks/probe_instance_service_presence.yml
  tasks:
    - name: Get service status
      ansible.builtin.systemd:
        name: "{{ edge_node_service_name }}"
      register: service_status
      when: r1setup_service_exists

    - name: Get detailed service status
      ansible.builtin.shell: |
        systemctl status {{ edge_node_service_name }} --no-pager -l
      register: detailed_status
      ignore_errors: true
      when: r1setup_service_exists

    - name: Check if Docker container is running
      ansible.builtin.shell: |
        docker ps --format "table {{ '{{.Names}}' }}\t{{ '{{.Status}}' }}\t{{ '{{.Ports}}' }}" --filter "name={{ mnl_docker_container_name }}"
      register: container_status
      ignore_errors: true

    - name: Detect deployed service file version
      ansible.builtin.shell: |
        SERVICE_PATH="/etc/systemd/system/{{ edge_node_service_name }}.service"
        VERSION=""

        ENV_LINE="$(systemctl show {{ edge_node_service_name }} --property=Environment --value 2>/dev/null || true)"
        if [ -n "$ENV_LINE" ]; then
          VERSION="$(printf '%s\n' "$ENV_LINE" | tr ' ' '\n' | sed -n 's/^R1SETUP_SERVICE_FILE_VERSION=//p' | head -n 1)"
        fi

        if [ -z "$VERSION" ]; then
          VERSION="$(systemctl cat {{ edge_node_service_name }} 2>/dev/null | sed -n 's/^# R1SETUP_SERVICE_FILE_VERSION=//p' | head -n 1)"
        fi

        if [ -z "$VERSION" ] && [ -f "$SERVICE_PATH" ]; then
          VERSION="$(sed -n 's/^# R1SETUP_SERVICE_FILE_VERSION=//p' "$SERVICE_PATH" | head -n 1)"
        fi

        if [ -z "$VERSION" ] && [ -f "$SERVICE_PATH" ]; then
          VERSION="$(sed -n 's/^Environment=\"\\{0,1\\}R1SETUP_SERVICE_FILE_VERSION=\\([^\" ]*\\).*$/\\1/p' "$SERVICE_PATH" | head -n 1)"
        fi

        printf '%s\n' "${VERSION:-unknown}"
      register: service_file_version
      ignore_errors: true
      when: r1setup_service_exists

    - name: Display service status summary
      debug:
        msg: |
          ==========================================
          NODE: {{ inventory_hostname }}
          ==========================================
          Service Name: {{ edge_node_service_name }}
          Service Status: {{ 'ACTIVE' if (service_status.status.ActiveState | default('')) == 'active' else 'INACTIVE/FAILED' if r1setup_service_exists else 'NOT FOUND' }}
          Service Enabled: {{ 'YES' if (service_status.status.UnitFileState | default('')) == 'enabled' else 'NO' if r1setup_service_exists else 'N/A' }}
          Service File Version: {{ service_file_version.stdout | default('unknown') | trim if r1setup_service_exists else 'NOT FOUND' }}
          Container Status: {{ 'RUNNING' if (container_status is succeeded and mnl_docker_container_name in container_status.stdout and 'Up' in container_status.stdout) else 'NOT RUNNING' }}

    - name: Display detailed service information
      debug:
        var: detailed_status.stdout_lines
      when: r1setup_service_exists and detailed_status is defined

    - name: Display container information
      debug:
        var: container_status.stdout_lines
      when: container_status.stdout_lines is defined and container_status.stdout_lines | length > 0

    - name: Show recent service logs (last 10 lines)
      ansible.builtin.shell: |
        journalctl -u {{ edge_node_service_name }} -n 10 --no-pager
      register: recent_logs
      ignore_errors: true
      when: r1setup_service_exists

    - name: Display recent logs
      debug:
        msg: |
          Recent logs (last 10 lines):
          {{ recent_logs.stdout }}
      when: r1setup_service_exists and recent_logs.stdout is defined

    - name: Service not found warning
      debug:
        msg: |
          ⚠️  WARNING: Service '{{ edge_node_service_name }}' not found on {{ inventory_hostname }}
          This usually means the Edge Node has not been deployed yet.
          Please run deployment first before checking service status.
      when: not r1setup_service_exists
