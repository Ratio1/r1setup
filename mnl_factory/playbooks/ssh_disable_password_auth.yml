---
- name: Manage SSH password authentication policy
  hosts: gpu_nodes
  become: true
  gather_facts: false
  vars:
    ssh_password_auth_action: "{{ ssh_password_auth_action | default('apply') }}"
    ssh_hardening_rollback_delay: "{{ ssh_hardening_rollback_delay | default(90) }}"
    ssh_hardening_state_dir: /var/tmp/r1setup_ssh_hardening
    ssh_hardening_main_config: /etc/ssh/sshd_config
    ssh_hardening_dropin_file_name: 99-r1setup-hardening.conf
    ssh_hardening_dropin_path: "/etc/ssh/sshd_config.d/{{ ssh_hardening_dropin_file_name }}"
    ssh_hardening_block: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
  tasks:
    - name: Validate supported action
      ansible.builtin.assert:
        that:
          - ssh_password_auth_action in ['apply', 'confirm', 'rollback']
        fail_msg: "ssh_password_auth_action must be one of apply, confirm, rollback"

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Resolve SSH service name
      ansible.builtin.set_fact:
        ssh_hardening_service_name: >-
          {% if 'ssh.service' in ansible_facts.services %}ssh{% elif 'sshd.service' in ansible_facts.services %}sshd{% else %}ssh{% endif %}

    - name: Resolve sshd binary path
      ansible.builtin.shell: |
        if command -v sshd >/dev/null 2>&1; then
          command -v sshd
        elif [ -x /usr/sbin/sshd ]; then
          echo /usr/sbin/sshd
        elif [ -x /usr/lib/openssh/sshd ]; then
          echo /usr/lib/openssh/sshd
        fi
      register: sshd_binary
      changed_when: false

    - name: Ensure sshd binary is available
      ansible.builtin.assert:
        that:
          - sshd_binary.stdout | trim | length > 0
        fail_msg: "Unable to locate sshd on the target host"

    - name: Check for sshd config drop-in directory
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config.d
      register: ssh_hardening_dropin_dir

    - name: Resolve SSH hardening paths
      ansible.builtin.set_fact:
        ssh_hardening_use_dropin: "{{ ssh_hardening_dropin_dir.stat.exists and ssh_hardening_dropin_dir.stat.isdir }}"
        ssh_hardening_target_config: "{{ ssh_hardening_dropin_path if (ssh_hardening_dropin_dir.stat.exists and ssh_hardening_dropin_dir.stat.isdir) else ssh_hardening_main_config }}"
        ssh_hardening_backup_path: "{{ ssh_hardening_state_dir }}/{{ inventory_hostname }}.backup"
        ssh_hardening_state_path: "{{ ssh_hardening_state_dir }}/{{ inventory_hostname }}.state"
        ssh_hardening_marker_path: "{{ ssh_hardening_state_dir }}/{{ inventory_hostname }}.confirmed"
        ssh_hardening_pid_path: "{{ ssh_hardening_state_dir }}/{{ inventory_hostname }}.pid"
        ssh_hardening_script_path: "{{ ssh_hardening_state_dir }}/{{ inventory_hostname }}.rollback.sh"

    - name: Ensure SSH hardening state directory exists
      ansible.builtin.file:
        path: "{{ ssh_hardening_state_dir }}"
        state: directory
        mode: "0700"

    - name: Check whether target SSH config exists
      ansible.builtin.stat:
        path: "{{ ssh_hardening_target_config }}"
      register: ssh_hardening_target_stat

    - name: Apply SSH password-auth hardening with rollback guard
      when: ssh_password_auth_action == 'apply'
      block:
        - name: Back up target SSH config
          ansible.builtin.copy:
            src: "{{ ssh_hardening_target_config }}"
            dest: "{{ ssh_hardening_backup_path }}"
            remote_src: true
            mode: preserve
          when: ssh_hardening_target_stat.stat.exists

        - name: Remove stale SSH config backup when target did not previously exist
          ansible.builtin.file:
            path: "{{ ssh_hardening_backup_path }}"
            state: absent
          when: not ssh_hardening_target_stat.stat.exists

        - name: Persist original SSH config state
          ansible.builtin.copy:
            dest: "{{ ssh_hardening_state_path }}"
            mode: "0600"
            content: "{{ 'present' if ssh_hardening_target_stat.stat.exists else 'absent' }}\n"

        - name: Remove stale SSH hardening confirmation marker
          ansible.builtin.file:
            path: "{{ ssh_hardening_marker_path }}"
            state: absent

        - name: Write SSH hardening rollback script
          ansible.builtin.copy:
            dest: "{{ ssh_hardening_script_path }}"
            mode: "0700"
            content: |
              #!/bin/sh
              set -eu
              if [ -f "{{ ssh_hardening_marker_path }}" ]; then
                exit 0
              fi
              {% if ssh_hardening_target_stat.stat.exists %}
              cp "{{ ssh_hardening_backup_path }}" "{{ ssh_hardening_target_config }}"
              {% else %}
              rm -f "{{ ssh_hardening_target_config }}"
              {% endif %}
              "{{ sshd_binary.stdout | trim }}" -t -f "{{ ssh_hardening_main_config }}"
              systemctl reload "{{ ssh_hardening_service_name }}" || systemctl restart "{{ ssh_hardening_service_name }}"

        - name: Start timed SSH hardening rollback job
          ansible.builtin.shell: |
            nohup sh -c 'sleep {{ ssh_hardening_rollback_delay | int }}; "{{ ssh_hardening_script_path }}"' >/dev/null 2>&1 &
            echo $! > "{{ ssh_hardening_pid_path }}"
          changed_when: true

        - name: Write SSH hardening drop-in config
          ansible.builtin.copy:
            dest: "{{ ssh_hardening_target_config }}"
            mode: "0644"
            content: "{{ ssh_hardening_block }}\n"
          when: ssh_hardening_use_dropin

        - name: Write SSH hardening block into main config
          ansible.builtin.blockinfile:
            path: "{{ ssh_hardening_main_config }}"
            marker: "# {mark} R1SETUP MANAGED SSH HARDENING"
            block: "{{ ssh_hardening_block }}"
            create: false
            backup: false
          when: not ssh_hardening_use_dropin

        - name: Validate SSH daemon configuration
          ansible.builtin.command:
            cmd: "{{ sshd_binary.stdout | trim }} -t -f {{ ssh_hardening_main_config }}"
          changed_when: false

        - name: Reload SSH service
          ansible.builtin.shell: |
            systemctl reload "{{ ssh_hardening_service_name }}" || systemctl restart "{{ ssh_hardening_service_name }}"
          changed_when: true
      rescue:
        - name: Restore backed up SSH config
          ansible.builtin.copy:
            src: "{{ ssh_hardening_backup_path }}"
            dest: "{{ ssh_hardening_target_config }}"
            remote_src: true
            mode: preserve
          when: ssh_hardening_target_stat.stat.exists

        - name: Remove SSH hardening target config when no backup existed
          ansible.builtin.file:
            path: "{{ ssh_hardening_target_config }}"
            state: absent
          when: not ssh_hardening_target_stat.stat.exists

        - name: Validate restored SSH daemon configuration
          ansible.builtin.command:
            cmd: "{{ sshd_binary.stdout | trim }} -t -f {{ ssh_hardening_main_config }}"
          changed_when: false

        - name: Reload restored SSH service
          ansible.builtin.shell: |
            systemctl reload "{{ ssh_hardening_service_name }}" || systemctl restart "{{ ssh_hardening_service_name }}"
          changed_when: true
          ignore_errors: true

        - name: Fail apply action after rollback
          ansible.builtin.fail:
            msg: "SSH hardening failed; original SSH configuration was restored."

    - name: Confirm successful SSH hardening
      when: ssh_password_auth_action == 'confirm'
      block:
        - name: Write SSH hardening confirmation marker
          ansible.builtin.copy:
            dest: "{{ ssh_hardening_marker_path }}"
            content: "confirmed\n"
            mode: "0600"

        - name: Stop rollback timer process
          ansible.builtin.shell: |
            if [ -f "{{ ssh_hardening_pid_path }}" ]; then
              kill "$(cat "{{ ssh_hardening_pid_path }}")" 2>/dev/null || true
            fi
          changed_when: false

        - name: Remove rollback bookkeeping files after confirmation
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ ssh_hardening_backup_path }}"
            - "{{ ssh_hardening_state_path }}"
            - "{{ ssh_hardening_pid_path }}"
            - "{{ ssh_hardening_script_path }}"

    - name: Roll back SSH hardening immediately
      when: ssh_password_auth_action == 'rollback'
      block:
        - name: Read original SSH config state
          ansible.builtin.slurp:
            src: "{{ ssh_hardening_state_path }}"
          register: ssh_hardening_state_file

        - name: Resolve original SSH config state
          ansible.builtin.set_fact:
            ssh_hardening_original_target_existed: "{{ (ssh_hardening_state_file.content | b64decode | trim) == 'present' }}"

        - name: Restore backed up SSH config
          ansible.builtin.copy:
            src: "{{ ssh_hardening_backup_path }}"
            dest: "{{ ssh_hardening_target_config }}"
            remote_src: true
            mode: preserve
          when: ssh_hardening_original_target_existed

        - name: Remove SSH hardening target config when no backup existed
          ansible.builtin.file:
            path: "{{ ssh_hardening_target_config }}"
            state: absent
          when: not ssh_hardening_original_target_existed

        - name: Validate restored SSH daemon configuration
          ansible.builtin.command:
            cmd: "{{ sshd_binary.stdout | trim }} -t -f {{ ssh_hardening_main_config }}"
          changed_when: false

        - name: Reload restored SSH service
          ansible.builtin.shell: |
            systemctl reload "{{ ssh_hardening_service_name }}" || systemctl restart "{{ ssh_hardening_service_name }}"
          changed_when: true

        - name: Stop rollback timer process
          ansible.builtin.shell: |
            if [ -f "{{ ssh_hardening_pid_path }}" ]; then
              kill "$(cat "{{ ssh_hardening_pid_path }}")" 2>/dev/null || true
            fi
          changed_when: false

        - name: Mark rollback as completed
          ansible.builtin.copy:
            dest: "{{ ssh_hardening_marker_path }}"
            content: "rolled_back\n"
            mode: "0600"

        - name: Remove rollback bookkeeping files after rollback
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ ssh_hardening_backup_path }}"
            - "{{ ssh_hardening_state_path }}"
            - "{{ ssh_hardening_pid_path }}"
            - "{{ ssh_hardening_script_path }}"
