---
# Mode-3 preflight: user said they manage GPU drivers (skip_gpu=true) but
# asked for the GPU image. Verify nvidia-smi works here, BEFORE we pull
# anything, so a broken user-managed setup fails loudly without us touching
# their drivers.
- name: Preflight nvidia-smi check (user-managed GPU drivers)
  command: nvidia-smi
  register: r1setup_user_nvidia_smi
  changed_when: false
  failed_when: r1setup_user_nvidia_smi.rc != 0
  when:
    - mnl_image_variant | default('cpu') == 'gpu'
    - skip_gpu | default(false)

- name: Log into Docker registry
  docker_login:
    registry: "{{ docker_registry }}"
    username: "{{ docker_registry_username | default(omit) }}"
    password: "{{ docker_registry_password | default(omit) }}"
  when: docker_registry != ""

- name: Pull Docker image
  docker_image:
    name: "{{ mnl_docker_image_url }}"
    source: pull
    force_source: yes

#- name: Start Docker container
#  docker_container:
#    name: "{{ docker_container_name }}"  # Use the variable for the container name
#    image: "{{ mnl_docker_image_url }}"
#    state: started
#    restart_policy: always  # Optional: ensures the container restarts on failure
#    ports:
#      - "80:80"  # Map host port 80 to container port 80 (customize as needed)
#    env:
#      # Add any environment variables needed for your container
#      ENV_VAR_NAME: "value"

# Include the services setup tasks
- name: Setup Services
  include_tasks: services.yml 


