name: Publish Ansible Collection

on:
  push:
    branches:
      - main
    paths:
      - "mnl_factory/galaxy.yml"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish collection
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        shell: bash
        working-directory: mnl_factory
    env:
      ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
      BEFORE_SHA: ${{ github.event.before }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect collection version change
        id: version_check
        run: |
          GITHUB_OUTPUT_PATH="${GITHUB_OUTPUT}" python - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          import yaml

          galaxy_path = Path("galaxy.yml")
          current = yaml.safe_load(galaxy_path.read_text())
          current_version = str(current["version"])

          before_sha = os.environ.get("BEFORE_SHA", "")
          previous_version = ""
          changed = True

          if before_sha and before_sha != "0000000000000000000000000000000000000000":
              result = subprocess.run(
                  ["git", "show", f"{before_sha}:mnl_factory/galaxy.yml"],
                  capture_output=True,
                  text=True,
              )
              if result.returncode == 0 and result.stdout.strip():
                  previous = yaml.safe_load(result.stdout)
                  previous_version = str(previous.get("version", ""))
                  changed = previous_version != current_version

          with open(os.environ["GITHUB_OUTPUT_PATH"], "a", encoding="utf-8") as f:
              f.write(f"version={current_version}\n")
              f.write(f"previous_version={previous_version}\n")
              f.write(f"changed={'true' if changed else 'false'}\n")
          PY

      - name: Stop when galaxy.yml changed without version bump
        if: steps.version_check.outputs.changed != 'true'
        run: |
          echo "galaxy.yml changed, but version stayed at ${{ steps.version_check.outputs.version }}."
          echo "Skipping publish."

      - name: Set up Python
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        if: steps.version_check.outputs.changed == 'true'
        run: python -m pip install --upgrade pip ansible-core

      - name: Validate publish secret
        if: steps.version_check.outputs.changed == 'true'
        run: |
          if [[ -z "${ANSIBLE_GALAXY_API_KEY}" ]]; then
            echo "ANSIBLE_GALAXY_API_KEY is not configured for the 'release' environment."
            exit 1
          fi

      - name: Build collection artifact
        if: steps.version_check.outputs.changed == 'true'
        run: ansible-galaxy collection build --force

      - name: Publish collection to Ansible Galaxy
        if: steps.version_check.outputs.changed == 'true'
        run: |
          ARTIFACT="$(ls -1 ./*.tar.gz | head -n 1)"
          if [[ -z "${ARTIFACT}" ]]; then
            echo "No collection artifact was produced."
            exit 1
          fi

          ansible-galaxy collection publish "${ARTIFACT}" --api-key "${ANSIBLE_GALAXY_API_KEY}"

      - name: Upload build artifact
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ansible-collection-${{ steps.version_check.outputs.version }}
          path: mnl_factory/*.tar.gz
          if-no-files-found: error
